<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossCtx — Service Dependency Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
    }
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #21262d;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }
    #header .stats {
      font-size: 13px;
      color: #8b949e;
    }
    #header .stats span {
      margin-left: 16px;
      padding: 3px 10px;
      background: #21262d;
      border-radius: 12px;
    }
    #graph { width: 100vw; height: 100vh; }
    .node circle {
      stroke-width: 2.5px;
      cursor: pointer;
      transition: r 0.2s;
    }
    .node:hover circle { filter: brightness(1.3); }
    .node text {
      font-size: 12px;
      font-weight: 600;
      fill: #f0f6fc;
      pointer-events: none;
      text-anchor: middle;
    }
    .node .badge {
      font-size: 10px;
      fill: #8b949e;
      font-weight: 400;
    }
    .link {
      stroke-width: 2;
      fill: none;
    }
    .link-label {
      font-size: 10px;
      fill: #484f58;
    }
    marker { fill: #484f58; }
    #tooltip {
      position: fixed;
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      max-width: 300px;
      z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #tooltip h3 { color: #f0f6fc; margin-bottom: 8px; font-size: 14px; }
    #tooltip p { color: #8b949e; margin: 4px 0; }
    #tooltip .url { color: #58a6ff; word-break: break-all; }
  </style>
</head>
<body>
  <div id="header">
    <h1>CrossCtx</h1>
    <div class="stats">
      <span>3 services</span>
      <span>9 endpoints</span>
      <span>2 dependencies</span>
    </div>
  </div>
  <svg id="graph"></svg>
  <div id="tooltip"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script>
    const nodes = [{"id":"order-service","endpoints":3,"urls":["https://order-service.internal:8082"],"version":"3.0.3"},{"id":"payment-service","endpoints":3,"urls":["https://payment-service.internal:8081"],"version":"3.0.3"},{"id":"user-service","endpoints":3,"urls":["https://user-service.internal:8080"],"version":"3.0.3"}];
    const links = [{"source":"order-service","target":"user-service","type":"description","evidence":"Referenced URL: https://user-service.internal:8080"},{"source":"order-service","target":"payment-service","type":"description","evidence":"Referenced URL: https://payment-service.internal:8081"}];
    const endpoints = [{"service":"order-service","method":"GET","path":"/orders","summary":"List all orders","response":{"type":"array","properties":{"id":"string","userId":"string","total":"number","status":"string"}}},{"service":"order-service","method":"POST","path":"/orders","summary":"Create a new order","requestBody":{"type":"object","properties":{"userId":"string","items":"array","paymentMethod":"string"}},"response":{"type":"object","properties":{"id":"string","status":"string"}}},{"service":"order-service","method":"GET","path":"/orders/{id}","summary":"Get order by ID","response":{"type":"object","properties":{"id":"string","userId":"string","items":"array","total":"number","status":"string"}}},{"service":"payment-service","method":"POST","path":"/payments","summary":"Process a payment","requestBody":{"type":"object","properties":{"orderId":"string","amount":"number","currency":"string","method":"string"}},"response":{"type":"object","properties":{"id":"string","status":"string","transactionId":"string"}}},{"service":"payment-service","method":"GET","path":"/payments/{id}","summary":"Get payment status","response":{"type":"object","properties":{"id":"string","status":"string","amount":"number"}}},{"service":"payment-service","method":"POST","path":"/payments/{id}/refund","summary":"Refund a payment","response":{"type":"object","properties":{"refundId":"string","status":"string"}}},{"service":"user-service","method":"GET","path":"/users","summary":"List all users","response":{"type":"array","properties":{"id":"string","name":"string","email":"string"}}},{"service":"user-service","method":"POST","path":"/users","summary":"Create a new user","requestBody":{"type":"object","properties":{"name":"string","email":"string","password":"string"}},"response":{"type":"object","properties":{"id":"string","name":"string"}}},{"service":"user-service","method":"GET","path":"/users/{id}","summary":"Get user by ID","response":{"type":"object","properties":{"id":"string","name":"string","email":"string","createdAt":"string"}}}];

    const colors = ["#58a6ff","#3fb950","#d29922","#f78166","#bc8cff","#f778ba","#79c0ff","#56d364"];

    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select("#graph")
      .attr("width", width)
      .attr("height", height);

    // Arrow markers
    svg.append("defs").selectAll("marker")
      .data(["arrow"])
      .enter().append("marker")
        .attr("id", d => d)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 35)
        .attr("refY", 0)
        .attr("markerWidth", 8)
        .attr("markerHeight", 8)
        .attr("orient", "auto")
      .append("path")
        .attr("d", "M0,-5L10,0L0,5");

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(200))
      .force("charge", d3.forceManyBody().strength(-500))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(60));

    const g = svg.append("g");

    // Zoom
    svg.call(d3.zoom()
      .scaleExtent([0.3, 4])
      .on("zoom", (event) => g.attr("transform", event.transform)));

    // Links
    const link = g.append("g").selectAll(".link")
      .data(links)
      .enter().append("line")
        .attr("class", "link")
        .attr("stroke", "#30363d")
        .attr("marker-end", "url(#arrow)");

    // Nodes
    const node = g.append("g").selectAll(".node")
      .data(nodes)
      .enter().append("g")
        .attr("class", "node")
        .call(d3.drag()
          .on("start", dragStarted)
          .on("drag", dragged)
          .on("end", dragEnded));

    node.append("circle")
      .attr("r", d => 20 + d.endpoints * 3)
      .attr("fill", (d, i) => colors[i % colors.length])
      .attr("opacity", 0.85)
      .attr("stroke", (d, i) => colors[i % colors.length]);

    node.append("text")
      .attr("dy", -30 - 3)
      .text(d => d.id);

    node.append("text")
      .attr("class", "badge")
      .attr("dy", -18)
      .text(d => d.endpoints + " endpoints");

    // Tooltip
    const tooltip = d3.select("#tooltip");

    node.on("mouseover", (event, d) => {
      const eps = endpoints.filter(e => e.service === d.id);
      let html = "<h3>" + d.id + "</h3>";
      if (d.urls.length) html += '<p class="url">' + d.urls.join(", ") + "</p>";
      html += "<p>Spec: " + d.version + "</p>";
      html += "<p><strong>Endpoints:</strong></p>";
      eps.forEach(e => {
        html += "<p>" + e.method + " " + e.path + (e.summary ? " — " + e.summary : "") + "</p>";
      });
      tooltip.html(html)
        .style("display", "block")
        .style("left", (event.clientX + 15) + "px")
        .style("top", (event.clientY + 15) + "px");
    })
    .on("mouseout", () => tooltip.style("display", "none"));

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
      node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
    });

    function dragStarted(event) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      event.subject.fx = event.subject.x;
      event.subject.fy = event.subject.y;
    }
    function dragged(event) {
      event.subject.fx = event.x;
      event.subject.fy = event.y;
    }
    function dragEnded(event) {
      if (!event.active) simulation.alphaTarget(0);
      event.subject.fx = null;
      event.subject.fy = null;
    }
  </script>
</body>
</html>
