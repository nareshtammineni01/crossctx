syntax = "proto3";

package order;

option go_package = "github.com/example/order-service/proto";

// OrderService exposes order operations over gRPC
service OrderService {
  rpc CreateOrder   (CreateOrderRequest)  returns (OrderResponse);
  rpc GetOrder      (GetOrderRequest)     returns (OrderResponse);
  rpc ListOrders    (ListOrdersRequest)   returns (ListOrdersResponse);
  rpc UpdateOrder   (UpdateOrderRequest)  returns (OrderResponse);
  rpc DeleteOrder   (DeleteOrderRequest)  returns (DeleteOrderResponse);
  // Streaming: server pushes order status updates
  rpc WatchOrder    (GetOrderRequest)     returns (stream OrderResponse);
}

message CreateOrderRequest {
  string product_id = 1;
  int32  quantity   = 2;
  string user_id    = 3;
}

message GetOrderRequest {
  string order_id = 1;
}

message ListOrdersRequest {
  string user_id   = 1;
  int32  page      = 2;
  int32  page_size = 3;
}

message UpdateOrderRequest {
  string order_id = 1;
  int32  quantity = 2;
  string status   = 3;
}

message DeleteOrderRequest {
  string order_id = 1;
}

message OrderResponse {
  string order_id   = 1;
  string product_id = 2;
  int32  quantity   = 3;
  string user_id    = 4;
  string status     = 5;
  string created_at = 6;
}

message ListOrdersResponse {
  repeated OrderResponse orders = 1;
  int32                  total  = 2;
}

message DeleteOrderResponse {
  bool   success = 1;
  string message = 2;
}
